# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: CI/CD - School Management System

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'microsoft'
          cache: maven

      - name: Build with Maven
        run: mvn clean verify

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: '${{ github.workspace }}/target/*.jar'

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: ui/react-app
        run: npm install

      - name: Build frontend
        working-directory: ui/react-app
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ui/react-app/dist

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    permissions:
      id-token: write
      contents: read
  
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar

      - name: Verify backend artifact exists
        run: |
          ls -la backend-jar
          test -n "$(ls backend-jar/*.jar 2>/dev/null)"
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          slot-name: 'Production'
          package: 'backend-jar/*.jar'

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      id-token: write
      contents: read
    env:
      FRONTEND_APP_NAME: ${{ secrets.AZURE_FRONTEND_APP_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Check frontend app configuration
        id: frontend-config
        run: |
          if [ -z "$FRONTEND_APP_NAME" ]; then
            echo "Frontend app name is not configured. Skipping frontend deployment."
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: ${{ steps.frontend-config.outputs.skip_deploy != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend for deployment
        if: ${{ steps.frontend-config.outputs.skip_deploy != 'true' }}
        working-directory: ui/react-app
        run: |
          npm install
          npm run build
          ls -la dist

      - name: Verify frontend build output
        if: ${{ steps.frontend-config.outputs.skip_deploy != 'true' }}
        run: |
          test -f ui/react-app/dist/index.html
          echo "Found frontend entry file: ui/react-app/dist/index.html"

      - name: Login to Azure
        if: ${{ steps.frontend-config.outputs.skip_deploy != 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend dist to Azure Web App
        if: ${{ steps.frontend-config.outputs.skip_deploy != 'true' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          slot-name: 'Production'
          package: ui/react-app/dist

  post-deploy-healthcheck:
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend
    if: ${{ always() && needs.deploy-backend.result == 'success' && (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') }}
    steps:
      - name: Verify backend health endpoint
        env:
          BACKEND_APP_NAME: ${{ secrets.AZURE_BACKEND_APP_NAME }}
        run: |
          if [ -z "$BACKEND_APP_NAME" ]; then
            echo "AZURE_BACKEND_APP_NAME secret is not set. Skipping health check."
            exit 0
          fi
          API_DOCS_URL="https://${BACKEND_APP_NAME}.azurewebsites.net/v3/api-docs"
          echo "Checking deployed API docs at $API_DOCS_URL"
          for i in {1..18}; do
            RESPONSE=$(curl --silent --show-error --max-time 20 "$API_DOCS_URL" || true)
            if echo "$RESPONSE" | grep -q '"openapi"'; then
              echo "Deployment health check passed"
              exit 0
            fi
            echo "Attempt $i failed, waiting for app startup..."
            sleep 10
          done
          echo "Warning: health check timed out. Deployment completed, but endpoint was not reachable from runner within retry window."
          exit 0
          