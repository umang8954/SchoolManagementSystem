spring:
  application:
    name: school-management-system
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  
  h2:
    console:
      enabled: true

server:
  port: 80
  address: 0.0.0.0

logging:
  level:
    root: WARN
    com.school: INFO
