spring:
  application:
    name: school-management-system
  
  # Database Configuration - MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/school_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.school: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
