spring:
  application:
    name: school-management-system
  
  # Database Configuration - Azure SQL Server
  datasource:
    url: jdbc:sqlserver://school-mgmt-sql-server.database.windows.net:1433;database=school_system;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
    username: 0241mca249@niet.co.in
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.SQLServer2019Dialect
    show-sql: false

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.school: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
